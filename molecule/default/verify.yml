---
- name: Verify
  hosts: all
  tasks:
    - name: Create test node
      znode:
        hosts: '127.0.0.1:2181'
        name: /test-node
        value: test-value
        state: present
      delegate_to: localhost
      run_once: yes

    - name: Read test node
      znode:
        hosts: '127.0.0.1:2181'
        name: /test-node
        op: get
      delegate_to: localhost
      run_once: yes

    - name: Delete test node
      znode:
        hosts: '127.0.0.1:2181'
        name: /test-node
        state: absent
      delegate_to: localhost
      run_once: yes