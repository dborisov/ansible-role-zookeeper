---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: "${IMAGE:-rockylinux}-${TAG:-8}-zookeeper"
    hostname: zookeeper
    image: "${IMAGE:-rockylinux}:${TAG:-8}"
    pre_build_image: true
    command: /sbin/init
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    published_ports:
      - "0.0.0.0:2181:2181/tcp"
      - "0.0.0.0:8080:8080/tcp"
      - "0.0.0.0:7000:7000/tcp"
    networks:
      - name: local
provisioner:
  name: ansible
  env:
    ZOOKEEPER_VERSION: ${ZOOKEEPER_VERSION:-3.8.0}
  inventory:
    host_vars:
      ${IMAGE:-rockylinux}-${TAG:-8}-zookeeper:
        zookeeper_id: 1
verifier:
  name: ansible
lint: |
  set -e
  yamllint .
  ansible-lint